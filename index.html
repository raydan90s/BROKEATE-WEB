<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logoSinFondo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brokeate</title>
  <meta name="description" content="Robo-advisor: perfilamiento, propuesta de inversión y revisión del asesor." />
  <script>
    // Fija el tema ANTES del primer pintado para no ver un destello claro→oscuro al
    // recargar. El ThemeContext toma el relevo al montar (misma clave, misma lógica).
    (function () {
      try {
        var g = localStorage.getItem('@roboadvisor_tema');
        var oscuro = g === 'dark' || (g !== 'light' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches);
        var raiz = document.documentElement;
        raiz.classList.toggle('dark', oscuro);
        raiz.style.colorScheme = oscuro ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
